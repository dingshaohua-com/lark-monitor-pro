[program:app]
command=/bin/bash -c "cd /home/work/backend && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8080"
directory=/home/work/backend
autostart=true
autorestart=true
loglevel=info
minfds=1024
minprocs=200
user=work
nodaemon=false
stderr_logfile=/home/work/logs/app.err.log
stdout_logfile=/home/work/logs/app.out.log